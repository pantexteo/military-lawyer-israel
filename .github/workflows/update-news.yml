name: Update News Block

on:
  schedule:
    # Каждую пятницу в 09:00 UTC (12:00 по Израилю)
    - cron: "0 9 * * 5"
  workflow_dispatch:
    # Ручной запуск из интерфейса GitHub Actions

jobs:
  update-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install exa-py

      - name: Run news update script
        env:
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
        run: python scripts/update_news.py

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet deploy/index.html || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deploy/index.html
          git commit -m "chore: auto-update news block $(date +%Y-%m-%d)"
          git push
