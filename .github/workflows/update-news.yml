name: Update News Articles

on:
  # ⏸️ КРОН ОСТАНОВЛЕН 31.05.2026 по итогам SEO-стратегического ревью.
  # Причина: авто-LLM-контент в YMYL-нише обучал Google классифицировать
  # домен как «энциклопедию про армию Израиля» (топ показов — инфо-запросы
  # «сколько служат репатрианты» с 0 кликов), размывал crawl budget и
  # подрывал E-E-A-T trust. Решение: прекратить автогенерацию новых статей.
  # Уже изданные 30 статей оставлены в индексе (решение владельца).
  #
  # Чтобы возобновить крон — раскомментировать блок schedule ниже:
  # schedule:
  #   - cron: '0 5 * * 1,3,5'  # Пн, Ср, Пт в 8:00 по Израилю (5:00 UTC)
  workflow_dispatch: # ручной запуск (оставлен)

jobs:
  update-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install exa-py openai

      - name: Run news update script
        env:
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          PYTHONUNBUFFERED: "1"
        run: python scripts/update_news.py

      - name: Commit and push new articles
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          # Проверяем есть ли изменения
          if git diff --staged --quiet; then
            echo "No new articles to commit"
          else
            git commit -m "feat: auto-update news articles $(date +%Y-%m-%d)

          Co-Authored-By: Kimi K2.5 via NVIDIA NIM <noreply@nvidia.com>"
            # Retry push до 3 раз — на случай параллельных коммитов в main
            for attempt in 1 2 3; do
              git pull --rebase origin main && git push && break
              echo "⚠️ Push attempt $attempt failed, retrying in 5s..."
              sleep 5
            done
          fi
